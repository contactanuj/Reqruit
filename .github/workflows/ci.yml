name: CI

# Run on every push and pull request to main.
# Unit tests only — integration tests require real services and run manually.
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras --dev

      - name: Run unit tests with coverage
        working-directory: backend
        env:
          # Stub values — unit tests mock all external services
          APP_ENV: testing
          MONGODB_URL: mongodb://localhost:27017
          MONGODB_DATABASE: reqruit_test
          WEAVIATE_URL: http://localhost:8080
          JWT_SECRET_KEY: ci-test-secret-key-minimum-32-chars!!
          LANGCHAIN_TRACING_V2: "false"
        run: |
          uv run pytest tests/unit/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            -v \
            --tb=short

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.13'
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --dev

      - name: Run ruff linter
        working-directory: backend
        run: uv run ruff check src/ tests/

      - name: Run ruff formatter check
        working-directory: backend
        run: uv run ruff format --check src/ tests/
