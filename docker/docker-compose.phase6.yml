# Phase 6: Background Task Processing Infrastructure
#
# Adds Redis, Celery workers, Beat scheduler, and Flower monitoring.
# Compose with the existing setup:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.phase6.yml up
#
# Or run standalone:
#   docker compose -f docker/docker-compose.phase6.yml up

services:
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - reqruit-net

  celery-worker-interactive:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: >
      celery -A src.tasks.celery_app worker
      --queues=interactive
      --concurrency=3
      --loglevel=info
      -n interactive@%h
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DATABASE=job_hunt
    restart: unless-stopped
    networks:
      - reqruit-net

  celery-worker-batch:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: >
      celery -A src.tasks.celery_app worker
      --queues=batch
      --concurrency=5
      --loglevel=info
      -n batch@%h
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DATABASE=job_hunt
    restart: unless-stopped
    networks:
      - reqruit-net

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: >
      celery -A src.tasks.celery_app beat
      --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    restart: unless-stopped
    networks:
      - reqruit-net

  flower:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: >
      celery -A src.tasks.celery_app flower
      --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    restart: unless-stopped
    networks:
      - reqruit-net

volumes:
  redis-data:

networks:
  reqruit-net:
    driver: bridge
